# /etc/nginx/sites-available/rockbaybooty
# Symlink to /etc/nginx/sites-enabled/ to activate.
#
# Replace YOUR_DOMAIN with your actual domain name throughout this file,
# then obtain a certificate with:
#   sudo certbot --nginx -d YOUR_DOMAIN -d www.YOUR_DOMAIN

# Rate-limit zone — define once in nginx.conf http {} block, referenced below.
# Add this line inside http {} in /etc/nginx/nginx.conf if missing:
#   limit_req_zone $binary_remote_addr zone=rbb_api:10m rate=30r/m;

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name YOUR_DOMAIN www.YOUR_DOMAIN;

    # TLS — certbot will fill these in automatically
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options     "nosniff"                      always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains" always;

    # Max upload size — keep aligned with MAX_PROFILE_PHOTO_BYTES (5MB) plus headroom
    client_max_body_size 12M;

    # Serve Next.js static assets directly from disk (bypass Node)
    location /_next/static/ {
        alias /var/www/rockbaybooty/.next/static/;
        expires 365d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Public folder (favicons, images, etc.)
    location /public/ {
        alias /var/www/rockbaybooty/public/;
        expires 30d;
        access_log off;
    }

    # Apply basic rate limiting to API endpoints
    location /api/ {
        limit_req zone=rbb_api burst=20 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # All other requests — proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
